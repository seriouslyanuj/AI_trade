
version: '3.9'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    environment:
      POSTGRES_DSN: postgresql+asyncpg://trader:password@db:5432/ai_trade
      REDIS_URL: redis://redis:6379/0
      MODEL_DIR: /models
      XGB_MODEL_PATH: /models/xgb_latest.json
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '8000:8000'
    volumes:
      - model_data:/models
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_trade
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d ai_trade"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  model_data:
